<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>课堂派签到助手</title>
    <meta name="description" content="课堂派签到助手 — 批量管理多账号签到，支持扫码识别、自动签到、签到记录追踪">
    <link rel="icon" href="/favicon.ico">
    <!-- 预加载 Material Icons 字体（提高图标加载优先级，避免等 CSS/JS 加载完才开始下载） -->
    <link rel="preload" href="/static/MaterialIcons-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <!-- MDUI 2 CSS -->
    <link rel="stylesheet" href="/static/mdui.css">
    <link rel="stylesheet" href="/static/material-icons.css">
    <!-- App CSS -->
    <link rel="stylesheet" href="/static/index.css">
</head>

<body>
    <div id="app" v-cloak>

        <!-- ============================================================
             登录 / 注册 页面
             ============================================================ -->
        <template v-if="!state.token">
            <div class="login-page">
                <div class="login-card">
                    <template v-if="route === 'login'">
                        <h2>签到助手</h2>
                        <p class="subtitle">登录以管理课堂派签到</p>
                        <form @submit.prevent="login">
                            <div class="field-wrap">
                                <label class="field-label">邮箱</label>
                                <input class="field-input" type="email" :value="form.email"
                                    @input="form.email=$event.target.value" placeholder="your@email.com"
                                    autocomplete="username">
                            </div>
                            <div class="field-wrap">
                                <label class="field-label">密码</label>
                                <div class="pwd-wrap">
                                    <input class="field-input" :type="showLoginPwd ? 'text' : 'password'"
                                        :value="form.password" @input="form.password=$event.target.value"
                                        placeholder="至少 8 位" autocomplete="current-password">
                                    <button class="pwd-toggle" type="button" @click="showLoginPwd = !showLoginPwd"
                                        tabindex="-1" :title="showLoginPwd ? '隐藏密码' : '显示密码'">
                                        <span class="material-icons">{{ showLoginPwd ? 'visibility_off' : 'visibility'
                                            }}</span>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" style="display:none"></button>
                            <mdui-button variant="filled" @click="login" :disabled="loading"
                                style="width:100%;margin-top:8px;height:44px;">{{ loading ? '登录中…' : '登 录'
                                }}</mdui-button>
                        </form>
                        <div class="form-footer">
                            <a @click="navigate('register')">没有账号？去注册</a>
                        </div>
                    </template>
                    <template v-else-if="route === 'register'">
                        <h2>注册账号</h2>
                        <p class="subtitle">创建签到助手账号</p>
                        <form @submit.prevent="register">
                            <div class="field-wrap">
                                <label class="field-label">邮箱<span class="req">*</span></label>
                                <input class="field-input" type="email" :value="form.email"
                                    @input="form.email=$event.target.value" placeholder="your@email.com"
                                    autocomplete="username">
                            </div>
                            <div class="field-wrap">
                                <label class="field-label">密码<span class="req">*</span></label>
                                <div class="pwd-wrap">
                                    <input class="field-input" :type="showRegPwd ? 'text' : 'password'"
                                        :value="form.password" @input="form.password=$event.target.value"
                                        placeholder="至少 8 位" autocomplete="new-password">
                                    <button class="pwd-toggle" type="button" @click="showRegPwd = !showRegPwd"
                                        tabindex="-1" :title="showRegPwd ? '隐藏密码' : '显示密码'">
                                        <span class="material-icons">{{ showRegPwd ? 'visibility_off' : 'visibility'
                                            }}</span>
                                    </button>
                                </div>
                            </div>
                            <div class="field-wrap">
                                <label class="field-label">邀请码 <span v-if="!inviteRequired"
                                        style="color:#9ca3af;font-weight:400;">（选填）</span><span v-else
                                        class="req">*</span></label>
                                <input class="field-input" :value="form.invite_code"
                                    @input="form.invite_code=$event.target.value" placeholder="邀请码">
                            </div>
                            <button type="submit" style="display:none"></button>
                            <mdui-button variant="filled" @click="register" :disabled="loading"
                                style="width:100%;margin-top:8px;height:44px;">{{ loading ? '注册中…' : '注 册'
                                }}</mdui-button>
                        </form>
                        <div class="form-footer">
                            <a @click="navigate('login')">已有账号？去登录</a>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- ============================================================
             主布局 (已登录)
             ============================================================ -->
        <template v-else>
            <div class="app-layout">
                <!-- 侧边栏 (纯 CSS flexbox) -->
                <aside class="sidebar" :class="{ open: sidebarOpen }">
                    <div class="sidebar-header">
                        <h1>签到助手</h1>
                        <small>课堂派 CheckInHelper</small>
                    </div>
                    <div class="sidebar-user">
                        <div class="avatar">{{ state.currentUser?.email?.charAt(0).toUpperCase() }}</div>
                        <div class="info">
                            <div class="name" :title="state.currentUser?.email">{{ state.currentUser?.email }}</div>
                            <span class="role-badge">{{ state.currentUser?.role === 'admin' ? '管理员' : '用户' }}</span>
                        </div>
                    </div>
                    <mdui-list>
                        <mdui-list-item :active="route==='dashboard'" @click="navigate('dashboard')">
                            <mdui-icon slot="icon" name="dashboard"></mdui-icon>首页
                        </mdui-list-item>
                        <mdui-list-item :active="route==='accounts'" @click="navigate('accounts')">
                            <mdui-icon slot="icon" name="key"></mdui-icon>账号
                        </mdui-list-item>
                        <mdui-list-item :active="route==='courses'" @click="navigate('courses')">
                            <mdui-icon slot="icon" name="book"></mdui-icon>课程
                        </mdui-list-item>
                        <mdui-list-item :active="route==='checkin'" @click="navigate('checkin')">
                            <mdui-icon slot="icon" name="checklist"></mdui-icon>签到
                        </mdui-list-item>
                        <mdui-list-item :active="route==='logs'" @click="navigate('logs')">
                            <mdui-icon slot="icon" name="history"></mdui-icon>日志
                        </mdui-list-item>
                        <mdui-list-item :active="route==='users'" @click="navigate('users')"
                            v-if="state.currentUser?.role === 'admin'">
                            <mdui-icon slot="icon" name="people"></mdui-icon>用户管理
                        </mdui-list-item>
                        <mdui-divider></mdui-divider>
                        <mdui-list-item @click="modals.changePwd = true">
                            <mdui-icon slot="icon" name="key"></mdui-icon>修改密码
                        </mdui-list-item>
                    </mdui-list>
                    <div class="sidebar-footer">
                        <mdui-list-item @click="logout"><mdui-icon slot="icon"
                                name="logout"></mdui-icon>退出登录</mdui-list-item>
                    </div>
                </aside>

                <!-- 遮罩 (移动端侧栏打开时) -->
                <div class="sidebar-overlay" v-if="sidebarOpen" @click="sidebarOpen=false"></div>

                <!-- 主内容 -->
                <div class="main-content">
                    <div class="main-header">
                        <button class="menu-btn" @click="sidebarOpen=!sidebarOpen">☰</button>
                        <h2>{{ pageTitle }}</h2>
                        <span class="breadcrumb">{{ pageSubtitle }}</span>
                    </div>
                    <div class="main-body">

                        <!-- ==========================================================
                             首页
                             ========================================================== -->
                        <div v-if="route === 'dashboard'">
                            <div class="stat-cards">
                                <div class="stat-card">
                                    <div class="num">{{ stats.accountCount }}</div>
                                    <div class="label">课堂派账号</div>
                                </div>
                                <div class="stat-card">
                                    <div class="num">{{ stats.bindingCount }}</div>
                                    <div class="label">课程绑定</div>
                                </div>
                                <div class="stat-card">
                                    <div class="num">{{ stats.todayCheckins }}</div>
                                    <div class="label">今日签到</div>
                                </div>
                                <div class="stat-card">
                                    <div class="num">{{ stats.totalLogs }}</div>
                                    <div class="label">累计记录</div>
                                </div>
                            </div>

                            <h3
                                style="margin:24px 0 12px;font-size:15px;font-weight:500; background: rgba(255,255,255,.8); border-radius: 20px; padding: 12px">
                                最近签到</h3>
                            <div class="table-wrap" v-if="recentLogs.length">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>课程</th>
                                            <th>账号</th>
                                            <th>结果</th>
                                            <th>时间</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr v-for="log in recentLogs" :key="log.id">
                                            <td style="font-size:13px;">{{ getCourseName(log.course_id) }}</td>
                                            <td style="font-size:13px;">{{ getAccountEmail(log.account_id) }}</td>
                                            <td><span class="status-chip" :class="log.status===1?'green':'red'">{{
                                                    log.status===1?'成功':'失败' }}</span>
                                                <span v-if="log.message" style="font-size:11px;color:#666;display:block;">{{ log.message }}</span></td>
                                            <td style="font-size:13px;white-space:nowrap;">{{ formatTime(log.created_at) }}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="empty-state" v-else>
                                <p>暂无签到记录</p>
                            </div>
                            <div class="fab-empty-blank"></div>
                        </div>

                        <!-- ==========================================================
                             账号管理
                             ========================================================== -->
                        <div v-if="route === 'accounts'">
                            <div class="toolbar">
                                <div class="left">
                                    <div>共 {{ accounts.length }} 个账号</div>
                                </div>
                                <div class="right">
                                    <mdui-button variant="filled" color="primary" @click="openAccountModal()">+
                                        添加账号</mdui-button>
                                </div>
                            </div>
                            <div class="table-wrap" v-if="accounts.length">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>姓名</th>
                                            <th>账号</th>
                                            <th>学校 / 学号</th>
                                            <th>状态</th>
                                            <th>创建时间</th>
                                            <th class="actions">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr v-for="acct in accounts" :key="acct.id">
                                            <td><strong>{{ acct.username || acct.email.split('@')[0] }}</strong></td>
                                            <td style="font-size:13px;color:#666;">{{ acct.email }}</td>
                                            <td style="font-size:13px;color:#666;">{{ acct.school }}{{ acct.stno ? ' / '+acct.stno : '' }}</td>
                                            <td><span class="status-chip"
                                                    :class="acct.status===1?'green':(acct.status===0?'orange':'red')"
                                                    :title="acct.status_message">{{ acct.status===1?'正常':(acct.status===0?'未知':'不可用') }}</span>
                                                <span v-if="acct.status_message" style="font-size:11px;color:#c62828;display:block;">{{ acct.status_message }}</span></td>
                                            <td>{{ formatTime(acct.created_at) }}</td>
                                            <td class="actions">
                                                <mdui-button-icon icon="verified" @click="verifyAccount(acct)"
                                                    title="验证凭据" style="color:#2563eb;"></mdui-button-icon>
                                                <mdui-button-icon icon="edit" @click="openAccountModal(acct)"
                                                    title="编辑"></mdui-button-icon>
                                                <mdui-button-icon icon="delete" @click="deleteAccount(acct)" title="删除"
                                                    style="color:#c62828;"></mdui-button-icon>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="empty-state" v-else><mdui-icon class="empty-icon" name="key"></mdui-icon>
                                <p>还没有课堂派账号，点击右上角添加</p>
                            </div>
                        </div>

                        <!-- ==========================================================
                             课程绑定
                             ========================================================== -->
                        <div v-if="route === 'courses'">
                            <div class="toolbar">
                                <div class="left">共 {{ bindings.length }} 条绑定</div>
                                <div class="right">
                                    <mdui-button variant="filled" color="primary" @click="openBindingModal()">+
                                        绑定课程</mdui-button>
                                </div>
                            </div>
                            <div class="table-wrap" v-if="bindings.length">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>课程代码</th>
                                            <th>课程 ID</th>
                                            <th>课程名称</th>
                                            <th>课堂派账号</th>
                                            <th>学期</th>
                                            <th>启用</th>
                                            <th class="actions">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr v-for="b in bindings" :key="b.id">
                                            <td><code
                                                    style="font-size:12px;background:#f1f5f9;padding:2px 6px;border-radius:4px;">{{ getCourseCode(b.course_id) }}</code>
                                            </td>
                                            <td style="font-size:13px;color:#666;">{{ b.course_id }}</td>
                                            <td>{{ getCourseName(b.course_id) }}</td>
                                            <td>{{ getAccountEmail(b.account_id) }}</td>
                                            <td>{{ getCourseSemester(b.course_id) }}</td>
                                            <td><mdui-switch :checked="b.is_active"
                                                    @change="toggleBinding(b, $event)"></mdui-switch></td>
                                            <td class="actions">
                                                <mdui-button-icon icon="delete" @click="deleteBinding(b)" title="解绑"
                                                    style="color:#c62828;"></mdui-button-icon>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="empty-state" v-else><mdui-icon class="empty-icon" name="book"></mdui-icon>
                                <p>还没有绑定课程</p>
                            </div>
                        </div>

                        <!-- ==========================================================
                             签到执行
                             ========================================================== -->
                        <div v-if="route === 'checkin'">
                            <!-- 二维码签到 -->
                            <div class="checkin-card">
                                <div class="checkin-header">
                                    <h3>📷 二维码签到</h3>
                                    <p>粘贴签到二维码链接或手动填写参数，对绑定该课程的所有账号执行二维码签到</p>
                                </div>

                                <!-- URL 快速解析 -->
                                <div class="field-wrap">
                                    <label class="field-label">签到链接 <span style="color:#6b7280;font-weight:400;">（粘贴 URL
                                            或扫码自动解析）</span></label>
                                    <div style="display:flex; gap:8px;">
                                        <input class="field-input" style="flex:1;" :value="checkinUrl"
                                            @input="parseCheckinUrl($event.target.value)"
                                            placeholder="https://w.ketangpai.com/checkIn/checkinCodeResult?ticketid=...&expire=...&sign=...&courseid=...&randNum=...">
                                        <mdui-button-icon icon="qr_code_scanner" @click="startScanner" title="扫码识别签到二维码"
                                            style="flex-shrink:0;"></mdui-button-icon>
                                    </div>
                                </div>

                                <!-- 手动输入参数 -->
                                <details style="margin:16px 0 20px;">
                                    <summary style="cursor:pointer; font-size:13px; color:#6366f1; padding:4px 0;">📝
                                        或手动填写参数</summary>
                                    <div class="checkin-fields" style="margin-top:14px;">
                                        <div class="checkin-row">
                                            <div class="field-wrap">
                                                <label class="field-label">CourseID<span class="req">*</span></label>
                                                <input class="field-input" :value="checkinForm.courseid"
                                                    @input="checkinForm.courseid=$event.target.value"
                                                    placeholder="课程 ID">
                                            </div>
                                            <div class="field-wrap">
                                                <label class="field-label">TicketID<span class="req">*</span></label>
                                                <input class="field-input" :value="checkinForm.ticketid"
                                                    @input="checkinForm.ticketid=$event.target.value"
                                                    placeholder="二维码中的 ticketid">
                                            </div>
                                        </div>
                                        <div class="checkin-row">
                                            <div class="field-wrap">
                                                <label class="field-label">Expire<span class="req">*</span></label>
                                                <input class="field-input" :value="checkinForm.expire"
                                                    @input="checkinForm.expire=$event.target.value" placeholder="过期时间戳">
                                            </div>
                                            <div class="field-wrap">
                                                <label class="field-label">Sign<span class="req">*</span></label>
                                                <input class="field-input" :value="checkinForm.sign"
                                                    @input="checkinForm.sign=$event.target.value" placeholder="签名">
                                            </div>
                                        </div>
                                        <div class="field-wrap">
                                            <label class="field-label">RandNum<span class="req">*</span></label>
                                            <input class="field-input" :value="checkinForm.randNum"
                                                @input="checkinForm.randNum=$event.target.value" placeholder="随机数">
                                        </div>
                                    </div>
                                </details>

                                <mdui-button variant="filled" @click="executeCheckin" :disabled="checkinLoading"
                                    class="checkin-btn">
                                    {{ checkinLoading ? '签到中…' : '🚀 执行二维码签到' }}
                                </mdui-button>

                                <div v-if="checkinResults.length" style="margin-top:24px;">
                                    <div class="result-summary">
                                        签到结果 ·
                                        <span class="result-ok">{{ checkinSuccessCount }} 成功</span>
                                        <span class="result-divider">/</span>
                                        <span class="result-fail">{{ checkinResults.length - checkinSuccessCount }}
                                            失败</span>
                                    </div>
                                    <div class="result-grid">
                                        <div v-for="r in checkinResults" :key="r.email" class="result-item"
                                            :class="r.success?'success':'fail'">
                                            <div class="email">{{ r.email }}</div>
                                            <div class="msg">{{ r.message }}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- /checkin-card (二维码签到) -->

                            <!-- GPS 位置签到 -->
                            <div class="checkin-card" style="margin-top:24px;">
                                <div class="checkin-header">
                                    <h3>📍 位置签到</h3>
                                    <p>使用考勤 ID 与课程 ID 对绑定该课程的所有账号执行 GPS/数字码签到，坐标将自动获取</p>
                                </div>

                                <div class="checkin-fields" style="margin-top:14px;">
                                    <div class="checkin-row">
                                        <div class="field-wrap">
                                            <label class="field-label">CourseID<span class="req">*</span></label>
                                            <input class="field-input" :value="gpsCheckinForm.courseid"
                                                @input="gpsCheckinForm.courseid=$event.target.value" placeholder="课程 ID">
                                        </div>
                                        <div class="field-wrap">
                                            <label class="field-label">考勤 ID<span class="req">*</span></label>
                                            <input class="field-input" :value="gpsCheckinForm.id"
                                                @input="gpsCheckinForm.id=$event.target.value" placeholder="考勤记录 ID">
                                        </div>
                                    </div>
                                </div>

                                <mdui-button variant="filled" @click="executeGpsCheckin" :disabled="gpsCheckinLoading"
                                    class="checkin-btn">
                                    {{ gpsCheckinLoading ? '签到中…' : '🚀 执行位置签到' }}
                                </mdui-button>

                                <div v-if="gpsCheckinResults.length" style="margin-top:24px;">
                                    <div class="result-summary">
                                        签到结果 ·
                                        <span class="result-ok">{{ gpsCheckinSuccessCount }} 成功</span>
                                        <span class="result-divider">/</span>
                                        <span class="result-fail">{{ gpsCheckinResults.length - gpsCheckinSuccessCount }}
                                            失败</span>
                                    </div>
                                    <div class="result-grid">
                                        <div v-for="r in gpsCheckinResults" :key="r.email" class="result-item"
                                            :class="r.success?'success':'fail'">
                                            <div class="email">{{ r.email }}</div>
                                            <div class="msg">{{ r.message }}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- /checkin-card (位置签到) -->
                        </div>

                        <!-- ==========================================================
                             签到日志
                             ========================================================== -->
                        <div v-if="route === 'logs'">
                            <div class="logs-toolbar">
                                <div class="log-filters-row">
                                    <div class="log-filter-wrap">
                                        <mdui-icon class="log-filter-icon" name="search"></mdui-icon>
                                        <input class="log-filter-input" type="text" placeholder="课程 ID"
                                            autocomplete="nope"
                                            :value="logFilter.course_id"
                                            @focus="const t=$event.target; if (t.dataset.initReadonly) { t.removeAttribute('readonly'); t.dataset.initReadonly=''; }"
                                            @input="logFilter.course_id = $event.target.value"
                                            readonly data-init-readonly="1">
                                        <button class="log-filter-clear" v-if="logFilter.course_id"
                                            @click="logFilter.course_id=''">✕</button>
                                    </div>

                                    <span class="log-filter-label">账号</span>
                                    <select class="log-filter-select" :value="logFilter.account_email"
                                        @change="logFilter.account_email = $event.target.value || null">
                                        <option value="">全部账号</option>
                                        <option v-for="acct in accounts" :key="acct.id" :value="acct.email">
                                            {{ acct.username || acct.email.split('@')[0] }} ({{ acct.email }})
                                        </option>
                                    </select>

                                    <div class="log-filter-status">
                                        <button :class="{ active: logFilter.status === null }"
                                            @click="logFilter.status = null">全部</button>
                                        <button :class="{ active: logFilter.status === 1 }"
                                            @click="logFilter.status = 1">成功</button>
                                        <button :class="{ active: logFilter.status === 0 }"
                                            @click="logFilter.status = 0">失败</button>
                                    </div>

                                    <span class="log-filter-label">从</span>
                                    <input class="log-filter-date" type="date" :value="logFilter.date_from"
                                        @input="logFilter.date_from = $event.target.value || null">
                                    <span class="log-filter-label">至</span>
                                    <input class="log-filter-date" type="date" :value="logFilter.date_to"
                                        @input="logFilter.date_to = $event.target.value || null">
                                </div>

                                <mdui-button variant="outlined" icon="refresh" @click="loadLogs"
                                    size="small">刷新</mdui-button>
                                <span class="log-count" v-if="logTotal">共 {{ logTotal }} 条记录</span>
                            </div>
                            <div class="table-wrap" v-if="logs.length">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>账号</th>

    <!-- Module 必须在 opencv.js 加载前定义 -->
    <script>var Module = {
            locateFile: function (path, prefix) {
                if (path === 'wechat_qrcode_files.data') return '/static/wechat_qrcode_files.data';
                return prefix + path;
            },
            onRuntimeInitialized: function () {
                function ready() {
                    try {
                        window._wechatDetector = new cv.wechat_qrcode_WeChatQRCode(
                            "/wechat_qrcode/detect.prototxt",
                            "/wechat_qrcode/detect.caffemodel",
                            "/wechat_qrcode/sr.prototxt",
                            "/wechat_qrcode/sr.caffemodel"
                        );
                        window._cvReady = true;
                    } catch (e) {
                        console.warn("[WeChatQR] init:", e);
                        window._cvReady = false;
                    }
                }
                if (window.cv instanceof Promise) {
                    window.cv.then(function (target) { window.cv = target; ready(); });
                } else {
                    ready();
                }
            },
        };</script>
    <!-- 微信二维码引擎模型文件（Emscripten 虚拟 FS，必须在 opencv.js 前加载） -->
    <script src="/static/wechat_qrcode_files.js"></script>

    <script src="/static/mdui.global.js"></script>
    <!-- ZXing (v0.23) -->
    <script src="/static/zxing.min.js"></script>
    <!-- OpenCV.js + WeChat QR 引擎（含 WASM，通过 GZip 压缩传输） -->
    <script async src="/static/opencv.js"></script>
    <!-- Vue 3 -->
    <script src="/static/vue.global.prod.js"></script>

    <!-- 应用逻辑 -->
    <script src="/static/index.js"></script>
